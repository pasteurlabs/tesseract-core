<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="none">
  <!-- Multiphysics Optimization: thermal ↔ structural coupling → optimized design -->

  <!-- Thermal solver Tesseract -->
  <rect x="4" y="30" width="62" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Heat / temperature grid icon -->
  <rect x="16" y="42" width="24" height="24" rx="1" stroke="#222" stroke-width="0.6"/>
  <!-- Temperature gradient bands -->
  <line x1="16" y1="48" x2="40" y2="48" stroke="#222" stroke-width="0.4" opacity="0.4"/>
  <line x1="16" y1="54" x2="40" y2="54" stroke="#222" stroke-width="0.4" opacity="0.6"/>
  <line x1="16" y1="60" x2="40" y2="60" stroke="#222" stroke-width="0.4" opacity="0.4"/>
  <!-- Heat source dot -->
  <circle cx="28" cy="48" r="3" stroke="#222" stroke-width="0.8" fill="none"/>
  <circle cx="28" cy="48" r="1" fill="#222"/>
  <text x="50" y="55" font-family="system-ui, sans-serif" font-size="7" fill="#555">T</text>
  <text x="35" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">thermal</text>

  <!-- Bidirectional arrows between solvers -->
  <line x1="66" y1="50" x2="88" y2="50" stroke="#222" stroke-width="1"/>
  <polygon points="88,47 94,50 88,53" fill="#222"/>
  <line x1="94" y1="60" x2="72" y2="60" stroke="#222" stroke-width="1"/>
  <polygon points="72,57 66,60 72,63" fill="#222"/>
  <text x="80" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#555">T</text>
  <text x="80" y="73" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#555">u</text>

  <!-- Structural solver Tesseract -->
  <rect x="96" y="30" width="62" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Mesh / displacement icon -->
  <rect x="108" y="42" width="24" height="24" rx="1" stroke="#222" stroke-width="0.6"/>
  <!-- Deformed mesh lines -->
  <path d="M 108,48 C 114,47 120,49 132,48" stroke="#222" stroke-width="0.4" opacity="0.5"/>
  <path d="M 108,54 C 116,52 124,56 132,54" stroke="#222" stroke-width="0.4" opacity="0.7"/>
  <path d="M 108,60 C 115,59 125,62 132,60" stroke="#222" stroke-width="0.4" opacity="0.5"/>
  <!-- Vertical deformed lines -->
  <path d="M 114,42 C 113,50 115,58 114,66" stroke="#222" stroke-width="0.4" opacity="0.4"/>
  <path d="M 120,42 C 122,50 118,58 120,66" stroke="#222" stroke-width="0.4" opacity="0.6"/>
  <path d="M 126,42 C 125,50 127,58 126,66" stroke="#222" stroke-width="0.4" opacity="0.4"/>
  <text x="142" y="55" font-family="system-ui, sans-serif" font-size="7" fill="#555">σ</text>
  <text x="127" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">structural</text>

  <!-- Arrow to optimization result -->
  <line x1="158" y1="55" x2="180" y2="55" stroke="#222" stroke-width="1"/>
  <polygon points="180,52 186,55 180,58" fill="#222"/>
  <text x="172" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">∇</text>

  <!-- Optimized design visualization -->
  <rect x="188" y="30" width="88" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Field grid -->
  <rect x="200" y="38" width="36" height="36" rx="2" stroke="#222" stroke-width="0.6"/>
  <!-- Concentric heat rings (simplified temperature field) -->
  <circle cx="214" cy="50" r="4" stroke="#222" stroke-width="0.5" opacity="0.7"/>
  <circle cx="214" cy="50" r="8" stroke="#222" stroke-width="0.4" opacity="0.5"/>
  <circle cx="214" cy="50" r="12" stroke="#222" stroke-width="0.3" opacity="0.3"/>
  <!-- Optimal source position -->
  <line x1="212" y1="48" x2="216" y2="52" stroke="#222" stroke-width="1.2"/>
  <line x1="216" y1="48" x2="212" y2="52" stroke="#222" stroke-width="1.2"/>
  <!-- Sensor points -->
  <circle cx="204" cy="42" r="1.5" stroke="#222" stroke-width="0.7" fill="none"/>
  <circle cx="232" cy="44" r="1.5" stroke="#222" stroke-width="0.7" fill="none"/>
  <circle cx="206" cy="68" r="1.5" stroke="#222" stroke-width="0.7" fill="none"/>
  <circle cx="230" cy="66" r="1.5" stroke="#222" stroke-width="0.7" fill="none"/>
  <!-- Convergence mini-plot on the right -->
  <line x1="244" y1="68" x2="270" y2="68" stroke="#555" stroke-width="0.5"/>
  <line x1="244" y1="68" x2="244" y2="42" stroke="#555" stroke-width="0.5"/>
  <path d="M 246,62 L 250,55 L 254,50 L 258,47 L 262,46 L 266,45.5" stroke="#222" stroke-width="1.2" fill="none"/>
  <text x="257" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#555">obj.</text>
  <text x="232" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#555">optimized design</text>

  <!-- Coupling loop -->
  <path d="M 80,80 L 80,108 L 35,108 L 35,80" stroke="#222" stroke-width="0.8" stroke-dasharray="3 2" fill="none"/>
  <polygon points="33,80 35,74 37,80" fill="#222"/>
  <text x="58" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">coupling iterations</text>
</svg>
