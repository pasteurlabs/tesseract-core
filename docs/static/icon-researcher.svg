<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hypercube / tesseract wireframe projection -->
  <!-- Outer cube -->
  <rect x="6" y="6" width="52" height="52" rx="1"/>
  <!-- Inner cube -->
  <rect x="20" y="20" width="24" height="24" rx="1"/>
  <!-- Connecting edges -->
  <line x1="6" y1="6" x2="20" y2="20"/>
  <line x1="58" y1="6" x2="44" y2="20"/>
  <line x1="6" y1="58" x2="20" y2="44"/>
  <line x1="58" y1="58" x2="44" y2="44"/>
</svg>
