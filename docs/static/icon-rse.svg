  <!-- Hexagonal lattice nodes -->
  <circle cx="32" cy="8" r="2.5"/>
  <circle cx="12" cy="20" r="2.5"/>
  <circle cx="52" cy="20" r="2.5"/>
  <circle cx="22" cy="36" r="2.5"/>
