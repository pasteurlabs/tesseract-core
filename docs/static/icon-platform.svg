<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Tessellated grid / Penrose-ish tiling -->
  <!-- Row 1 -->
  <polygon points="8,8 24,8 28,20 12,20"/>
  <polygon points="24,8 40,8 44,20 28,20"/>
  <polygon points="40,8 56,8 52,20 44,20"/>
  <!-- Row 2 (offset) -->
  <polygon points="12,20 28,20 32,32 16,32"/>
  <polygon points="28,20 44,20 48,32 32,32"/>
  <polygon points="44,20 52,20 56,32 48,32"/>
  <!-- Row 3 -->
  <polygon points="8,32 16,32 20,44 12,44"/>
  <polygon points="16,32 32,32 36,44 20,44"/>
  <polygon points="32,32 48,32 52,44 36,44"/>
  <polygon points="48,32 56,32 56,44 52,44"/>
  <!-- Row 4 -->
  <polygon points="12,44 20,44 24,56 8,56"/>
  <polygon points="20,44 36,44 40,56 24,56"/>
  <polygon points="36,44 52,44 56,56 40,56"/>
</svg>
