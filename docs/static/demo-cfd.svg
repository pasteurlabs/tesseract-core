<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="none">
  <!-- CFD Optimization: v₀ → Navier-Stokes Tesseract → vorticity → loss → ∇ -->

  <!-- Initial velocity field -->
  <rect x="4" y="35" width="62" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Flow arrows icon -->
  <line x1="16" y1="50" x2="50" y2="50" stroke="#222" stroke-width="0.8"/>
  <polygon points="48,48 54,50 48,52" fill="#222"/>
  <line x1="16" y1="60" x2="44" y2="60" stroke="#222" stroke-width="0.8"/>
  <polygon points="42,58 48,60 42,62" fill="#222"/>
  <line x1="22" y1="70" x2="50" y2="70" stroke="#222" stroke-width="0.8"/>
  <polygon points="48,68 54,70 48,72" fill="#222"/>
  <text x="35" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">v₀ (optimize)</text>

  <!-- Arrow 1 -->
  <line x1="66" y1="60" x2="88" y2="60" stroke="#222" stroke-width="1"/>
  <polygon points="88,57 94,60 88,63" fill="#222"/>

  <!-- Navier-Stokes Tesseract -->
  <rect x="96" y="35" width="62" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Inner tesseract symbol -->
  <rect x="114" y="46" width="14" height="14" rx="1" stroke="#222" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <rect x="118" y="50" width="6" height="6" rx="0.5" stroke="#222" stroke-width="0.8"/>
  <text x="127" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">JAX-CFD</text>

  <!-- Arrow 2 -->
  <line x1="158" y1="60" x2="180" y2="60" stroke="#222" stroke-width="1"/>
  <polygon points="180,57 186,60 180,63" fill="#222"/>
  <text x="169" y="53" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">ω</text>

  <!-- Target image / loss -->
  <rect x="188" y="35" width="88" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Simplified vorticity pattern -->
  <circle cx="220" cy="55" r="8" stroke="#222" stroke-width="0.8" fill="none"/>
  <circle cx="240" cy="55" r="6" stroke="#222" stroke-width="0.8" fill="none"/>
  <circle cx="255" cy="60" r="4" stroke="#222" stroke-width="0.8" fill="none"/>
  <text x="232" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#555">MSE(ω, target)</text>

  <!-- Gradient arrow (backprop) -->
  <line x1="186" y1="15" x2="10" y2="15" stroke="#222" stroke-width="0.8" stroke-dasharray="3 2"/>
  <polygon points="10,12 4,15 10,18" fill="#222"/>
  <text x="98" y="11" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">∇ through simulation</text>
</svg>
