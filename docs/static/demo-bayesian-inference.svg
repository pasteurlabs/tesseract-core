<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="none">
  <!-- Bayesian Inference: prior p(F) → Lorenz-96 Tesseract → posterior p(F|obs), driven by ∇-based NUTS sampling -->

  <!-- Prior -->
  <rect x="4" y="35" width="52" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Prior axis + broad bump -->
  <line x1="12" y1="74" x2="48" y2="74" stroke="#555" stroke-width="0.6"/>
  <path d="M 12,74 C 22,74 24,52 30,52 C 36,52 38,74 48,74" stroke="#222" stroke-width="1" fill="none"/>
  <text x="30" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">prior p(F)</text>

  <!-- Arrow 1 -->
  <line x1="56" y1="60" x2="78" y2="60" stroke="#222" stroke-width="1"/>
  <polygon points="78,57 84,60 78,63" fill="#222"/>

  <!-- Lorenz-96 Tesseract (forward model) -->
  <rect x="86" y="35" width="62" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Inner tesseract symbol -->
  <rect x="104" y="46" width="14" height="14" rx="1" stroke="#222" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <rect x="108" y="50" width="6" height="6" rx="0.5" stroke="#222" stroke-width="0.8"/>
  <text x="117" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#555">Lorenz-96</text>

  <!-- Arrow 2 -->
  <line x1="148" y1="60" x2="170" y2="60" stroke="#222" stroke-width="1"/>
  <polygon points="170,57 176,60 170,63" fill="#222"/>

  <!-- Posterior with true value -->
  <rect x="178" y="35" width="98" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Posterior axis -->
  <line x1="188" y1="74" x2="266" y2="74" stroke="#555" stroke-width="0.6"/>
  <!-- Histogram-like samples under the peak -->
  <line x1="214" y1="74" x2="214" y2="66" stroke="#555" stroke-width="0.6"/>
  <line x1="220" y1="74" x2="220" y2="58" stroke="#555" stroke-width="0.6"/>
  <line x1="226" y1="74" x2="226" y2="50" stroke="#555" stroke-width="0.6"/>
  <line x1="232" y1="74" x2="232" y2="58" stroke="#555" stroke-width="0.6"/>
  <line x1="238" y1="74" x2="238" y2="66" stroke="#555" stroke-width="0.6"/>
  <!-- Sharp posterior bump -->
  <path d="M 196,74 C 216,74 218,46 226,46 C 234,46 236,74 256,74" stroke="#222" stroke-width="1" fill="none"/>
  <!-- True-value tick -->
  <line x1="226" y1="44" x2="226" y2="74" stroke="#222" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="226" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#555">true F</text>
  <text x="227" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#555">posterior p(F | obs)</text>

  <!-- Sampler arrow (NUTS uses ∇ through the solver) -->
  <line x1="176" y1="15" x2="10" y2="15" stroke="#222" stroke-width="0.8" stroke-dasharray="3 2"/>
  <polygon points="10,12 4,15 10,18" fill="#222"/>
  <text x="93" y="11" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">∇-based NUTS sampler</text>
</svg>
