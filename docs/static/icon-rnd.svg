<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Orbital trajectory arc — slingshot from inner to outer -->
  <!-- Central body -->
  <circle cx="20" cy="40" r="3" fill="#222" stroke="none"/>
  <!-- Orbital path (elliptical arc sweeping outward) -->
  <path d="M 16 36 A 18 18 0 0 1 50 20"/>
  <!-- Trajectory escaping outward -->
  <path d="M 50 20 L 58 10"/>
  <!-- Arrow tip -->
  <polyline points="52,9 58,10 57,17"/>
  <!-- Inner orbit ring -->
  <ellipse cx="20" cy="40" rx="10" ry="6" transform="rotate(-25 20 40)" stroke-dasharray="3 2" opacity="0.5"/>
</svg>
