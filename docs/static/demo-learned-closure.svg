<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="none">
  <!-- Learned Closure: Neural closure + PDE solver in a time-stepping loop, with loss curve -->

  <!-- Neural closure Tesseract -->
  <rect x="4" y="28" width="62" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Small neural net icon (3 nodes → 2 nodes → 1 node) -->
  <circle cx="18" cy="43" r="2" stroke="#222" stroke-width="0.8"/>
  <circle cx="18" cy="53" r="2" stroke="#222" stroke-width="0.8"/>
  <circle cx="18" cy="63" r="2" stroke="#222" stroke-width="0.8"/>
  <circle cx="35" cy="46" r="2" stroke="#222" stroke-width="0.8"/>
  <circle cx="35" cy="60" r="2" stroke="#222" stroke-width="0.8"/>
  <circle cx="52" cy="53" r="2" stroke="#222" stroke-width="0.8"/>
  <!-- Connections -->
  <line x1="20" y1="43" x2="33" y2="46" stroke="#222" stroke-width="0.5"/>
  <line x1="20" y1="43" x2="33" y2="60" stroke="#222" stroke-width="0.5"/>
  <line x1="20" y1="53" x2="33" y2="46" stroke="#222" stroke-width="0.5"/>
  <line x1="20" y1="53" x2="33" y2="60" stroke="#222" stroke-width="0.5"/>
  <line x1="20" y1="63" x2="33" y2="46" stroke="#222" stroke-width="0.5"/>
  <line x1="20" y1="63" x2="33" y2="60" stroke="#222" stroke-width="0.5"/>
  <line x1="37" y1="46" x2="50" y2="53" stroke="#222" stroke-width="0.5"/>
  <line x1="37" y1="60" x2="50" y2="53" stroke="#222" stroke-width="0.5"/>
  <text x="35" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">closure</text>

  <!-- Arrow: closure → solver -->
  <line x1="66" y1="53" x2="88" y2="53" stroke="#222" stroke-width="1"/>
  <polygon points="88,50 94,53 88,56" fill="#222"/>
  <text x="80" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">ν</text>

  <!-- PDE solver Tesseract -->
  <rect x="96" y="28" width="62" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Wave/solution icon -->
  <path d="M 108,53 C 112,42 118,42 122,53 C 126,64 132,64 136,53 C 140,42 146,42 148,48" stroke="#222" stroke-width="1.2" fill="none"/>
  <text x="127" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">Burgers solver</text>

  <!-- Time-stepping loop -->
  <path d="M 127,78 L 127,98 L 35,98 L 35,78" stroke="#222" stroke-width="0.8" stroke-dasharray="3 2" fill="none"/>
  <polygon points="33,78 35,72 37,78" fill="#222"/>
  <text x="81" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">time steps</text>

  <!-- Arrow: solver → loss -->
  <line x1="158" y1="53" x2="180" y2="53" stroke="#222" stroke-width="1"/>
  <polygon points="180,50 186,53 180,56" fill="#222"/>

  <!-- Loss curve / training convergence -->
  <rect x="188" y="28" width="88" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Axes -->
  <line x1="198" y1="68" x2="266" y2="68" stroke="#555" stroke-width="0.6"/>
  <line x1="198" y1="68" x2="198" y2="36" stroke="#555" stroke-width="0.6"/>
  <!-- Descending loss curve -->
  <path d="M 200,40 C 208,42 212,55 220,60 C 228,63 240,65 260,66" stroke="#222" stroke-width="1.5" fill="none"/>
  <text x="232" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#555">training loss</text>

  <!-- Gradient arrow (backprop through both) -->
  <line x1="186" y1="15" x2="10" y2="15" stroke="#222" stroke-width="0.8" stroke-dasharray="3 2"/>
  <polygon points="10,12 4,15 10,18" fill="#222"/>
  <text x="98" y="11" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">∇ end-to-end</text>
</svg>
