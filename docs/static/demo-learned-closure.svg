<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="none">
  <!-- Learned Closure: u → neural viscosity Tesseract → ν → Burgers solver Tesseract → u_next → loss → ∇ -->

  <!-- Flow state u -->
  <rect x="4" y="35" width="50" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Wavy solution profile icon -->
  <path d="M12 65 q6 -16 12 0 t12 0" stroke="#222" stroke-width="0.9" fill="none"/>
  <text x="29" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">flow u</text>

  <!-- Arrow 1 -->
  <line x1="54" y1="60" x2="72" y2="60" stroke="#222" stroke-width="1"/>
  <polygon points="72,57 78,60 72,63" fill="#222"/>

  <!-- Neural viscosity Tesseract -->
  <rect x="80" y="35" width="58" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Tiny MLP icon -->
  <circle cx="92" cy="50" r="2" stroke="#222" stroke-width="0.8" fill="none"/>
  <circle cx="92" cy="60" r="2" stroke="#222" stroke-width="0.8" fill="none"/>
  <circle cx="92" cy="70" r="2" stroke="#222" stroke-width="0.8" fill="none"/>
  <circle cx="109" cy="55" r="2" stroke="#222" stroke-width="0.8" fill="none"/>
  <circle cx="109" cy="65" r="2" stroke="#222" stroke-width="0.8" fill="none"/>
  <circle cx="126" cy="60" r="2" stroke="#222" stroke-width="0.8" fill="none"/>
  <line x1="94" y1="50" x2="107" y2="55" stroke="#222" stroke-width="0.5"/>
  <line x1="94" y1="60" x2="107" y2="55" stroke="#222" stroke-width="0.5"/>
  <line x1="94" y1="60" x2="107" y2="65" stroke="#222" stroke-width="0.5"/>
  <line x1="94" y1="70" x2="107" y2="65" stroke="#222" stroke-width="0.5"/>
  <line x1="111" y1="55" x2="124" y2="60" stroke="#222" stroke-width="0.5"/>
  <line x1="111" y1="65" x2="124" y2="60" stroke="#222" stroke-width="0.5"/>
  <text x="109" y="79" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#555">neural ν</text>

  <!-- Arrow 2 -->
  <line x1="138" y1="60" x2="156" y2="60" stroke="#222" stroke-width="1"/>
  <polygon points="156,57 162,60 156,63" fill="#222"/>
  <text x="147" y="53" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">ν</text>

  <!-- Burgers solver Tesseract -->
  <rect x="164" y="35" width="58" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Inner tesseract symbol -->
  <rect x="180" y="46" width="14" height="14" rx="1" stroke="#222" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <rect x="184" y="50" width="6" height="6" rx="0.5" stroke="#222" stroke-width="0.8"/>
  <text x="193" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#555">Burgers</text>

  <!-- Arrow 3 -->
  <line x1="222" y1="60" x2="240" y2="60" stroke="#222" stroke-width="1"/>
  <polygon points="240,57 246,60 240,63" fill="#222"/>

  <!-- Loss vs data -->
  <rect x="248" y="35" width="28" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <text x="262" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">loss</text>
  <text x="262" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="5.5" fill="#555">vs data</text>

  <!-- Gradient arrow (backprop through solver into network) -->
  <line x1="246" y1="15" x2="86" y2="15" stroke="#222" stroke-width="0.8" stroke-dasharray="3 2"/>
  <polygon points="86,12 80,15 86,18" fill="#222"/>
  <text x="166" y="11" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">∇ through solver → network</text>
</svg>
