<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="none">
  <!-- Bayesian Inference: NumPyro → Tesseract → Posterior -->

  <!-- NumPyro / MCMC box -->
  <rect x="4" y="35" width="62" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <text x="35" y="57" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#222">NUTS</text>
  <text x="35" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">sampler</text>

  <!-- Arrow 1 -->
  <line x1="66" y1="60" x2="88" y2="60" stroke="#222" stroke-width="1"/>
  <polygon points="88,57 94,60 88,63" fill="#222"/>
  <text x="80" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#555">F</text>

  <!-- Tesseract box (Lorenz solver) -->
  <rect x="96" y="35" width="62" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Inner tesseract symbol -->
  <rect x="114" y="46" width="14" height="14" rx="1" stroke="#222" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <rect x="118" y="50" width="6" height="6" rx="0.5" stroke="#222" stroke-width="0.8"/>
  <text x="127" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">Lorenz 96</text>

  <!-- Arrow 2 -->
  <line x1="158" y1="60" x2="180" y2="60" stroke="#222" stroke-width="1"/>
  <polygon points="180,57 186,60 180,63" fill="#222"/>

  <!-- Posterior distribution curve -->
  <rect x="188" y="35" width="88" height="50" rx="6" stroke="#222" stroke-width="1.2"/>
  <!-- Axis lines -->
  <line x1="198" y1="75" x2="266" y2="75" stroke="#555" stroke-width="0.6"/>
  <line x1="198" y1="75" x2="198" y2="43" stroke="#555" stroke-width="0.6"/>
  <!-- Bell curve / posterior density -->
  <path d="M 205,74 C 210,74 215,73 220,70 C 225,65 228,52 232,46 C 236,52 239,65 244,70 C 249,73 254,74 259,74" stroke="#222" stroke-width="1.5" fill="none"/>
  <!-- True value marker -->
  <line x1="232" y1="44" x2="232" y2="75" stroke="#222" stroke-width="0.6" stroke-dasharray="2 1.5"/>
  <text x="232" y="41" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#555">F*</text>
  <!-- Label -->
  <text x="232" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#555">posterior</text>

  <!-- Feedback loop arrow (MCMC iteration) -->
  <path d="M 127,85 L 127,105 L 35,105 L 35,85" stroke="#222" stroke-width="0.8" stroke-dasharray="3 2" fill="none"/>
  <polygon points="33,85 35,79 37,85" fill="#222"/>
</svg>
