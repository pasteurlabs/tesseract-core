codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: true
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
        informational: false
        only_pulls: false
    patch: off
comment:
  layout: "condensed_header, diff, condensed_files, condensed_footer"
  hide_project_coverage: false
ignore:
  - "tesseract_core/_version.py"
