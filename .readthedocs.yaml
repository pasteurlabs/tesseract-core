# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

  jobs:
    create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
      - uv venv
    install:
      - cp production.uv.lock uv.lock
      - uv sync --extra dev --frozen
    build:
      html:
        # dirhtml serves clean, extension-less URLs (.../pipelines/ instead of
        # .../pipelines.html). Old .html URLs are preserved via redirect stubs
        # emitted from docs/conf.py.
        - uv run sphinx-build -T -b dirhtml docs $READTHEDOCS_OUTPUT/html

# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: docs/conf.py
