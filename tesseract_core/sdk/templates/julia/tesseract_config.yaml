# Tesseract configuration file
# Generated by tesseract {{version}} on {{timestamp}}

name: "{{name}}"
version: "0.1.0"
description: ""

build_config:
  # Use the official Julia base image (includes Julia + stdlib)
  base_image: "julia:1.11-bookworm"

  # Platform to build the container for. In general, images can only be executed
  # on the platform they were built for.
  target_platform: "native"

  # Copy Julia project and solver source into the container
  package_data:
    - ["julia/", "julia/"]

  custom_build_steps:
    # Use a shared Julia depot so packages are accessible to any runtime user.
    - "ENV JULIA_DEPOT_PATH=/tesseract/.julia"
    # Ensure precompiled cache is portable across CPUs of the same architecture.
    - 'RUN if [ "$(uname -m)" = "x86_64" ]; then export JULIA_CPU_TARGET="generic;sandybridge,-xsaveopt,clone_all;haswell,-rdrnd,base(1)"; else export JULIA_CPU_TARGET="generic"; fi && mkdir -p /tesseract/.julia && julia --project=/tesseract/julia -e "import Pkg; Pkg.instantiate(); Pkg.precompile()"'
    - "RUN chmod -R 777 /tesseract/.julia"
    # Tell JuliaCall to use the system Julia and skip its own package management.
    # JULIA_PKG_PRECOMPILE_AUTO=0 prevents Julia from recompiling packages at
    # runtime when the container UID differs from the build UID.
    - "ENV PYTHON_JULIACALL_EXE=/usr/local/julia/bin/julia PYTHON_JULIACALL_PROJECT=/tesseract/julia PYTHON_JULIAPKG_OFFLINE=yes JULIA_PKG_PRECOMPILE_AUTO=0"
