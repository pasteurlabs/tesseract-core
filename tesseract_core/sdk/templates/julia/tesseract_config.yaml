# Tesseract configuration file
# Generated by tesseract {{version}} on {{timestamp}}

name: "{{name}}"
version: "0.1.0"
description: ""

# Arbitrary user-defined metadata
# metadata:
#   key: value

build_config:
  # Base image to use for the container, must be Ubuntu or Debian-based
  # base_image: "debian:bookworm-slim"

  # Platform to build the container for. In general, images can only be executed
  # on the platform they were built for.
  target_platform: "native"

  # Additional packages to install in the container (via apt-get)
  # Julia is installed via custom_build_steps below
  # extra_packages:
  #  - package_name

  # Data to copy into the container, relative to the project root
  # package_data:
  #  - [path/to/source, path/to/destination]

  # Install Julia and precompile packages in the container
  custom_build_steps:
    - |
      RUN apt-get update && apt-get install -y curl && \
          curl -fsSL https://install.julialang.org | sh -s -- -y && \
          /root/.juliaup/bin/julia -e 'using Pkg; Pkg.add(["Enzyme"])'
    # TODO: Add your Julia packages to the Pkg.add list above
