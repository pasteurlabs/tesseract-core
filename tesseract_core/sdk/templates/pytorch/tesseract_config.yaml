# Tesseract configuration file
# Generated by tesseract {{version}} on {{timestamp}}

name: "{{name}}"
version: "0.1.0"
description: ""

# Environment variables to set in the container
# env:
#   MY_VAR: "my_value"

# Arbitrary user-defined metadata
# metadata:
#   key: value

build_config:
  # Base image to use for the container, must be Ubuntu or Debian-based
  # base_image: "debian:bookworm-slim"

  # Python version to use inside the container (e.g. "3.12"). When set, the given
  # version is installed via `uv python install`, decoupling it from the base
  # image. When unset, the base image's system Python is used. Cannot be combined
  # with conda requirements; set the version in tesseract_environment.yaml instead.
  # python_version: "3.12"

  # If true, create the Python virtual environment with --system-site-packages so
  # it can access packages pre-installed in the base image. Cannot be combined with
  # python_version.
  # system_site_packages: false

  # Platform to build the container for. In general, images can only be executed
  # on the platform they were built for.
  target_platform: "native"

  # Additional packages to install in the container (via apt-get)
  # extra_packages:
  #  - package_name

  # Data to copy into the container, relative to the project root
  # package_data:
  #  - [path/to/source, path/to/destination]

  # Additional Dockerfile commands to run during the build process
  # custom_build_steps:
  #  - |
  #   RUN echo "Hello, World!"
