[pytest]
# Standalone config for benchmarks — overrides the root pyproject.toml so that
# `pytest benchmarks/` doesn't pull in typeguard, coverage, or test-suite paths.
addopts =
    --benchmark-disable-gc
    --benchmark-warmup=on
    --benchmark-min-rounds=2
    --benchmark-time-unit=ms
    --benchmark-group-by=func
    --benchmark-columns=min,max,mean,stddev,median,rounds
